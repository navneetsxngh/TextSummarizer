# ─── flake8 ──────────────────────────────────────────────────────────────────
[flake8]
max-line-length = 120
max-doc-length  = 150
# E203  : whitespace before ':' (conflicts with black)
# W503  : line break before binary operator (PEP 8 updated)
# E501  : line too long (handled by max-line-length)
extend-ignore = E203, W503, E501
exclude =
    TSenv,
    .git,
    __pycache__,
    *.egg-info,
    dist,
    build,
    research,
    .github,
    migrations
per-file-ignores =
    # Allow unused imports in __init__.py (re-exports)
    __init__.py: F401
    # Allow assert statements and magic values in tests
    tests/*: S101, S106, S311

# ─── isort ───────────────────────────────────────────────────────────────────
[isort]
profile          = black
line_length      = 120
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap  = 0
use_parentheses  = true
ensure_newline_before_comments = true
skip = TSenv, research
known_first_party  = src, textsummarizer, app
known_third_party  = fastapi, uvicorn, transformers, torch, datasets, pydantic, starlette

# ─── pytest ──────────────────────────────────────────────────────────────────
[tool:pytest]
testpaths  = tests
python_files   = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes
    -p no:warnings
markers =
    unit:        Unit tests (no I/O, no model loading)
    integration: Integration tests (may load model)
    slow:        Tests that take more than 5 seconds
asyncio_mode = auto

# ─── coverage ────────────────────────────────────────────────────────────────
[coverage:run]
source = src, app
branch = true
omit =
    TSenv/*
    tests/*
    research/*
    */__init__.py
    */migrations/*
    setup.py

[coverage:report]
fail_under   = 50
show_missing = true
skip_covered = false
exclude_lines =
    pragma: no cover
    def __repr__
    if self\.debug
    raise NotImplementedError
    if __name__ == .__main__.:
    pass
    \.\.\.

[coverage:xml]
output = coverage.xml

# ─── mypy (optional static type checking) ────────────────────────────────────
[mypy]
python_version = 3.10
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
exclude = TSenv|research
